# HoneyAI — Docker Compose
# Run: docker compose up -d
# Logs: docker compose logs -f honeyai

services:
  # ─── Ollama (local LLM engine) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: honeyai-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai_backend
    # GPU support (uncomment for NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─── Pull the default model on first run ────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: honeyai-ollama-pull
    networks:
      - ai_backend
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["ollama", "pull", "${AI_MODEL:-qwen2.5:1.5b}"]
    environment:
      - OLLAMA_HOST=ollama:11434

  # ─── HoneyAI honeypot ──────────────────────────────────────────────────────
  honeyai:
    build: .
    container_name: honeyai
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /run:rw,noexec,nosuid,size=64m
    pids_limit: 256
    mem_limit: 512m
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - AI_MODEL=${AI_MODEL:-qwen2.5:1.5b}
      # Reporting (optional — set in .env file)
      - ABUSEIPDB_KEY=${ABUSEIPDB_KEY:-}
      - OTX_KEY=${OTX_KEY:-}
      - DSHIELD_KEY=${DSHIELD_KEY:-}
      - BLOCKLIST_KEY=${BLOCKLIST_KEY:-}
      - VT_KEY=${VT_KEY:-}
      # Notifications (optional)
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT=${TELEGRAM_CHAT:-}
    ports:
      # Web
      - "${HTTP_PORT:-80}:8081"
      # SSH
      - "22:2222"
      - "2222:2222"
      # FTP
      - "21:2121"
      # Telnet
      - "23:2323"
      # SMTP
      - "25:2525"
      # MySQL
      - "3306:3306"
      # Redis
      - "6379:6379"
      # Git
      - "9418:9418"
      # VNC
      - "5900:59000"
      # RDP
      - "3389:3389"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./honeyfs:/app/honeyfs:ro
      - honeyai_logs:/app/logs
      # Passive detectors log mounts from host (optional, required if enabled in config)
      - /var/log/syslog:/var/log/syslog:ro
      - /var/log/samba:/var/log/samba:ro
    networks:
      public_honeypot:
        ipv4_address: 172.30.50.10
      ai_backend:

volumes:
  ollama_data:
  honeyai_logs:

networks:
  public_honeypot:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.50.0/24
  ai_backend:
    driver: bridge
    internal: true
