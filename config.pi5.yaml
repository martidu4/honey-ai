# HoneyAI — Pi5 Production Config
# API keys loaded from .env via config.js env var overrides

honeyai:
  name: "HoneyAI"
  version: "1.0.0"

ai:
  provider: "ollama"
  url: "http://192.168.1.148:11434"  # Debian Ollama node
  model: "qwen2.5:1.5b"
  timeout: 60000
  temperature: 0.9

protocols:
  http:
    enabled: true
    port: 8081
    fake_server_header: "Apache/2.4.51 (Ubuntu)"

  ssh:
    enabled: true
    port: 2222
    banner: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"
    fake_hostname: "prod-server-01"
    tarpit: true
    tarpit_ports: [2227, 2228]

  ftp:
    enabled: true
    port: 2121
    banner: "220 (vsFTPd 3.0.5)"

  telnet:
    enabled: true
    port: 2323

  smtp:
    enabled: true
    port: 2525
    banner: "220 mail.example.com ESMTP Postfix"

  mysql:
    enabled: true
    port: 3306

  redis:
    enabled: true
    port: 6379

  git:
    enabled: true
    port: 9418

  mssql:
    enabled: true
    port: 14330

  snmp:
    enabled: true
    port: 16100

  httpproxy:
    enabled: true
    port: 8180

  mcp:
    enabled: true
    port: 8000

  samba:
    enabled: false
    log_path: "/var/log/samba/full_audit.log"

  portscan:
    enabled: true
    log_path: "/var/log/syslog"
    prefix: "PORTSCAN:"

# Keys loaded from process.env — config.js auto-enables platforms when keys present
reporting:
  enabled: true
  cooldown_minutes: 1440
  abuseipdb:
    enabled: false
    api_key: ""
  otx:
    enabled: false
    api_key: ""
    ssh_pulse_id: ""
    http_pulse_id: ""
  dshield:
    enabled: false
    api_key: ""
    user_id: ""
  blocklist_de:
    enabled: false
    api_key: ""
    email: ""
  virustotal:
    enabled: false
    api_key: ""

notifications:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""

logging:
  level: "info"
  file: "./logs/honeyai.log"
  events_file: "./logs/events.json"
